<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<div class="container">
    <header class="py-3 mb-4 border-bottom">
        <nav class="navbar navbar-expand-lg p-0">
            <div class="container-fluid px-0">

                <a href="/" class="navbar-brand d-flex align-items-center link-body-emphasis text-decoration-none">
                    <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                        <use xlink:href="#bootstrap"></use>
                    </svg>
                    <span class="fs-4">Todo Lists</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                    aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="nav nav-pills ms-auto">
                        <li class="nav-item"><a href="{{ url_for('home') }}" class="nav-link active"aria-current="page">Home</a></li>
                        {% if not current_user.is_authenticated %}
                        <li class="nav-item"><a href="{{ url_for('register') }}" class="nav-link">Register</a></li>
                        <li class="nav-item"><a href="{{ url_for('login')}}" class="nav-link">Login</a></li>
                        {% else %}
                        <li class="nav-item"><a href="{{ url_for('charts') }}" class="nav-link">Analysis</a></li>
                        <li class="nav-item"><a href="{{ url_for('logout')}}" class="nav-link">Logout</a></li>
                        {% endif %}
                    </ul>
                </div>

            </div>
        </nav>
    </header>
</div>

</html>
