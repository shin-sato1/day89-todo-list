<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block styles %}

    {{ bootstrap.load_css() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='/style.css') }}" />

    {% endblock %}

    <title>{% block title %} {% endblock %}</title>

</head>

<body>
    {% include 'header.html' %}
    {% block content %} {% endblock %}
    {% include 'footer.html' %}

    {{ bootstrap.load_js() }}
</body>

</html>
